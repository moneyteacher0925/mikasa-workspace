<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Apple SD Gothic Neo', sans-serif; }
  .card { width: 600px; height: 600px; background: #111; border-radius: 24px; padding: 48px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle at 30% 40%, rgba(255,60,60,0.06) 0%, transparent 50%); }
  .title { font-size: 18px; color: #555; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 48px; font-weight: 500; }
  .bars { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 32px; }
  .bar-group { display: flex; flex-direction: column; gap: 10px; }
  .bar-label { display: flex; justify-content: space-between; align-items: baseline; }
  .bar-name { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: 1px; }
  .bar-score { font-size: 16px; color: #666; font-weight: 500; }
  .bar-track { width: 100%; height: 12px; background: #1a1a1a; border-radius: 6px; overflow: hidden; position: relative; }
  .bar-fill { height: 100%; border-radius: 6px; transition: width 1s ease; }
  .bar-fill.desire { width: 90%; background: linear-gradient(90deg, #ff4444, #ff6b6b); box-shadow: 0 0 20px rgba(255,68,68,0.3); }
  .bar-fill.thinking { width: 40%; background: linear-gradient(90deg, #333, #555); }
  .bar-fill.execution { width: 50%; background: linear-gradient(90deg, #333, #555); }
  .subtitle { margin-top: 48px; font-size: 14px; color: #333; letter-spacing: 2px; text-align: center; line-height: 1.8; }
  .highlight { color: #ff4444; font-weight: 700; }
</style>
</head>
<body>
<div class="card">
  <div class="title">100개를 모으는 3가지 요소</div>
  <div class="bars">
    <div class="bar-group">
      <div class="bar-label">
        <span class="bar-name">욕심</span>
        <span class="bar-score" style="color: #ff4444;">9 / 10</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill desire"></div>
      </div>
    </div>
    <div class="bar-group">
      <div class="bar-label">
        <span class="bar-name">사고력</span>
        <span class="bar-score">4 / 10</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill thinking"></div>
      </div>
    </div>
    <div class="bar-group">
      <div class="bar-label">
        <span class="bar-name">실행력</span>
        <span class="bar-score">5 / 10</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill execution"></div>
      </div>
    </div>
  </div>
  <div class="subtitle">
    욕심만 많고 대가리 든 거 없는<br>
    무식하게 실행하는 <span class="highlight">그저 그런 NPC</span>
  </div>
</div>
</body>
</html>
