<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body { margin: 0; padding: 0; }
.thumb {
  width: 500px;
  height: 500px;
  background: #0a1628;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
}
.logo {
  width: 80px;
  height: 80px;
  background: #1a2a4a;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 42px;
  font-weight: 900;
  color: #fff;
  font-family: Arial, sans-serif;
}
.title {
  font-family: Arial, sans-serif;
  font-size: 52px;
  font-weight: 900;
  color: #fff;
  letter-spacing: 6px;
}
.sub {
  font-family: Arial, sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: rgba(255,255,255,0.7);
  letter-spacing: 2px;
}
.divider {
  width: 60px;
  height: 3px;
  background: #4a90d9;
  border-radius: 2px;
}
.desc {
  font-family: Arial, sans-serif;
  font-size: 15px;
  font-weight: 600;
  color: rgba(255,255,255,0.5);
}
</style>
</head>
<body>
<div class="thumb">
  <div class="logo">G</div>
  <div class="divider"></div>
  <div class="title">GUARD</div>
  <div class="sub">네이버 리워드 트래픽</div>
  <div class="desc">100% 실사용자 · 순위 최적화</div>
</div>
</body>
</html>
