<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 300px; }
.banner {
  width: 1200px; height: 300px;
  background: linear-gradient(135deg, #E53935 0%, #B71C1C 50%, #1a1a1a 100%);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
  font-family: -apple-system, 'Noto Sans KR', sans-serif;
}
.banner::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(circle at 30% 50%, rgba(255,255,255,0.08) 0%, transparent 50%),
              radial-gradient(circle at 80% 20%, rgba(255,255,255,0.05) 0%, transparent 40%);
}
.banner::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
}
.content { position: relative; z-index: 1; text-align: center; padding: 0 60px; }
.label {
  display: inline-block;
  background: rgba(255,255,255,0.15);
  color: #fff;
  font-size: 13px;
  font-weight: 600;
  padding: 5px 16px;
  border-radius: 20px;
  letter-spacing: 2px;
  margin-bottom: 18px;
  backdrop-filter: blur(4px);
}
h1 {
  color: #fff;
  font-size: 38px;
  font-weight: 800;
  letter-spacing: -1px;
  margin-bottom: 14px;
  text-shadow: 0 2px 20px rgba(0,0,0,0.2);
}
p {
  color: rgba(255,255,255,0.85);
  font-size: 16px;
  font-weight: 400;
  letter-spacing: 0.5px;
}
.dots {
  position: absolute;
  top: 30px; right: 40px;
  display: flex; gap: 6px;
}
.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
}
.dot.active { background: rgba(255,255,255,0.5); }
.line-deco {
  position: absolute;
  bottom: 40px; left: 50px;
  width: 60px; height: 3px;
  background: rgba(255,255,255,0.2);
  border-radius: 2px;
}
</style>
</head>
<body>
<div class="banner">
  <div class="dots"><div class="dot active"></div><div class="dot"></div><div class="dot"></div></div>
  <div class="line-deco"></div>
  <div class="content">
    <div class="label">MARKETING</div>
    <h1>필요한 마케팅, 골라서 바로 시작하세요.</h1>
    <p>블로그 · 카페 · 트래픽 · 가구매 — 원하는 상품을 선택하고 결제하면 바로 진행됩니다.</p>
  </div>
</div>
</body>
</html>
